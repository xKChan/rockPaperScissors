<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <meta charset="UTF-8">
  </head>
  <body>
    <button id="rockBtn">Rock</button>
    <button id="paperBtn">Paper</button>
    <button id="scissorsBtn">Scissors</button>
    <div id="results">

    </div>


    <script>
      const rockBtn = document.querySelector('#rockBtn');
      rockBtn.addEventListener('click', () =>  {
        playerSelection = 'Rock'; 
        console.log(playRound(playerSelection));
      }); 

      const paperBtn = document.querySelector('#paperBtn');
      paperBtn.addEventListener('click', () =>  {
        playerSelection = 'Paper'; 
        console.log(playRound(playerSelection));
      }); 

      const scissorsBtn = document.querySelector('#scissorsBtn');
      scissorsBtn.addEventListener('click', () =>  {
        playerSelection = 'Scissors'; 
        console.log(playRound(playerSelection));
      }); 
      
      

      let win = 0;
      let lose = 0;
      let tie = 0;  

      function getComputerChoice() {
        let pick = Math.random();
        if (pick >= 0.66) {
          return 'Rock';
        }
        else if (pick <= 0.33) {
          return 'Paper';
        }
        else {
          return 'Scissors';
        }
      }

      function getPlayerPick() {
        let pick = prompt("Rock, Paper, or Scissors?");
        let pick2 = pick.charAt(0).toUpperCase() + pick.slice(1).toLowerCase();
        return pick2;
      }

      function playRound(playerSelection) {
        let computerSelection = getComputerChoice();
        const displayPicks = document.querySelector('#results')

        const computerPick = document.createElement('div');
        computerPick.textContent = 'Computer Picked: ' + computerSelection;
        
        const playerPick = document.createElement('div');
        playerPick.textContent = 'Player Picked: ' + playerSelection;

        const winner = document.createElement('div');

        displayPicks.appendChild(computerPick);
        displayPicks.appendChild(playerPick);



        if (playerSelection === computerSelection) {
          tie = tie + 1
          winner.textContent = "It's a Tie!";
          displayPicks.appendChild(winner);
          return 'tie';
        }
        else if (playerSelection === 'Rock' && computerSelection === 'Paper') {
          lose = lose + 1
          winner.textContent = "You Lose! Rock loses to Paper";
          displayPicks.appendChild(winner);
          return 'lose';

        }
        else if (playerSelection === 'Rock' && computerSelection === 'Scissors') {
          win = win + 1
          winner.textContent = "You Win! Rock beats Scissors";
          displayPicks.appendChild(winner);
          return 'win';
        }
        else if (playerSelection === 'Paper' && computerSelection === 'Rock') {
          win = win + 1
          winner.textContent = "You Win! Paper beats Rock";
          displayPicks.appendChild(winner);
          return 'win';
        }
        else if (playerSelection === 'Paper' && computerSelection === 'Scissors') {
          lose = lose + 1
          winner.textContent = "You Lose! Paper loses to Scissors";
          displayPicks.appendChild(winner);
          return 'lose';

        }
        else if (playerSelection === 'Scissors' && computerSelection === 'Paper') {
          win = win + 1
          winner.textContent = "You Win! Scissors beats Paper";
          displayPicks.appendChild(winner);
          return 'win';
        }
        else if (playerSelection === 'Scissors' && computerSelection === 'Rock') {
          lose = lose + 1
          winner.textContent = "You Lose! Scissors loses to Rock";
          displayPicks.appendChild(winner);
          return 'lose';
        }
      }

      function winner() {
        if (win > lose) {
          return `You win! The score: Player - ${win} // Computer - ${lose}`
        }
        else if (lose > win) {
          return `You lose! The score: Player - ${win} // Computer - ${lose}`
        }
        else {
          return `It's a tie! The score: Player - ${win} // Computer - ${lose}`
        }
      }

    </script>
  </body>
</html>
